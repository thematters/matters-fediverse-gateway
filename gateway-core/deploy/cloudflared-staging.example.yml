# Example only. Do not commit a real tunnel UUID, credentials file, or token.
#
# This exposes the public federation surface and the staging webhook receiver
# through one locally managed Cloudflare Tunnel.
#
# Temporary no-Zero-Trust mode: route staging-admin to the local proxy, but make
# the local proxy return 404 for that hostname until Cloudflare Access or an
# equivalent operator auth layer is active.
tunnel: STAGING_TUNNEL_UUID
credentials-file: /etc/cloudflared/STAGING_TUNNEL_UUID.json

ingress:
  - hostname: staging-gateway.matters.town
    service: http://127.0.0.1:8080
  - hostname: staging-admin.matters.town
    service: http://127.0.0.1:8080
  - hostname: staging-hooks.matters.town
    service: http://127.0.0.1:8788
  - service: http_status:404
